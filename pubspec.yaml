name: mnivesh_central
description: "A super app for internal company use"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  dio: ^5.9.1
  flutter_riverpod: ^3.1.0
  installed_apps: ^2.1.0
  flutter_downloader: ^1.11.10
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  open_filex: ^4.7.0
  flutter_widget_from_html: ^0.17.1
  flutter_launcher_icons: ^0.14.4
  app_links: ^6.4.1
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  device_info_plus: ^12.3.0
  intl: ^0.20.2
  lottie: ^3.3.2
  phosphor_flutter: ^2.1.0
  flutter_neumorphic_plus: ^3.5.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  share_plus: ^12.0.1
  cached_network_image: any
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - shorebird.yaml

# MUST be outside flutter section
flutter_launcher_icons:
  android: true
  ios: true

  # Main launcher icon
  image_path: "assets/mNiveshIcon.png"
  # Android minimum supported SDK
  min_sdk_android: 21